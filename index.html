                pool = higher;
                found = true;
                break;
            }

            if (lower.length > 0) {
                pool = lower;
                found = true;
                break;
            }
        }

        // если вообще ничего не осталось
        if (!found) {
            showResults();
            return;
        }
    }

    currentQuestion = pool[Math.floor(Math.random() * pool.length)];
    usedIds.add(currentQuestion.id);

    document.getElementById('q-text').innerText = currentQuestion.question;
    document.getElementById('q-counter').innerText = `${questionsAnswered + 1} / ${maxQuestions}`;
    document.getElementById('progress').style.width = (questionsAnswered / maxQuestions * 100) + "%";

    const container = document.getElementById('options-container');
    container.innerHTML = currentQuestion.options.map((opt, i) => 
        `<div class="option" onclick="selectOption(${i}, this)">${String.fromCharCode(65+i)}. ${opt}</div>`
    ).join('');

    animateTimerBar();
    startTimer();
}

        function handleNext() {
            clearInterval(timerId);
            const correctIdx = currentQuestion.answer.charCodeAt(0) - 65;
            sectionStats[currentQuestion.section].total++;

            if (selectedIdx === correctIdx) {
                score++;
                sectionStats[currentQuestion.section].correct++;
                if (currentDifficulty < 6) currentDifficulty++; 
            } else {
                if (currentDifficulty > 1) currentDifficulty--; 
            }

            questionsAnswered++;
            if (questionsAnswered < maxQuestions) { nextAdaptiveQuestion(); } else { showResults(); }
        }

        function showResults() {
            showPage('page-result');
            const levels = [
                { id: "A0", name: "Starter" },
                { id: "A1", name: "Elementary" },
                { id: "A2", name: "Pre-Intermediate" },
                { id: "B1", name: "Intermediate" },
                { id: "B2", name: "Upper-Intermediate" },
                { id: "C1", name: "Advanced" }
            ];

            let levelIdx = currentDifficulty - 1;
            if (score < 18 && levelIdx > 4) levelIdx = 4;
            if (score < 14 && levelIdx > 3) levelIdx = 3;
            if (score < 10 && levelIdx > 2) levelIdx = 2;
            if (score < 6 && levelIdx > 1) levelIdx = 1;
            if (score < 3) levelIdx = 0;

            const finalLevel = levels[Math.max(0, Math.min(levelIdx, 5))];
            document.getElementById('res-level').innerText = finalLevel.id;
            document.getElementById('res-desc').innerText = finalLevel.name;
            document.getElementById('res-score').innerText = `${score} / ${questionsAnswered} CORRECT ANSWERS`;

            let statsHtml = '';
            for (let s in sectionStats) {
                let data = sectionStats[s];
                if (data.total > 0) {
                    let percentage = Math.round((data.correct / data.total) * 100);
                    statsHtml += `<div class="stat-row"><div style="text-transform: capitalize;">${s}</div><div>${percentage}%</div></div>
                                  <div class="stat-bar"><div class="stat-fill" style="width:${percentage}%"></div></div>`;
                }
            }
            document.getElementById('stats-area').innerHTML = statsHtml;
        }

        function selectOption(idx, el) {
            selectedIdx = idx;
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function showPage(id) {
            document.querySelectorAll('.container').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-num').innerText = timeLeft;
                if (timeLeft <= 0) handleNext();
            }, 1000);
        }

        function resetTimer() { clearInterval(timerId); timeLeft = 15; document.getElementById('timer-num').innerText = timeLeft; }

        function animateTimerBar() {
            const bar = document.getElementById('timer-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 15s linear'; bar.style.width = '0%'; }, 50);
        }
    </script>
</body>
</html>

    // ============================================================
    // IMPROVED CAT ENGINE
    // ============================================================

    const LEVELS = ["A1","A2","B1","B2","C1","C2"];
    const LEVEL_NAMES = {
        "A1": "Elementary",
        "A2": "Pre-Intermediate",
        "B1": "Intermediate",
        "B2": "Upper-Intermediate",
        "C1": "Advanced",
        "C2": "Proficient"
    };

    // Theta (ability estimate): maps to difficulty 1–6
    // Start at B1 = 3.0
    let theta = 3.0;
    let questionsAnswered = 0;
    const maxQuestions = 24;
    let selectedIdx = null;
    let timerId = null;
    let timeLeft = 15;
    let usedIds = new Set();
    let currentQuestion = null;
    let score = 0;

    // Category balance: exactly 8 per section
    const sectionLimits = { grammar: 8, vocabulary: 8, meaning: 8 };
    let sectionCounts = { grammar: 0, vocabulary: 0, meaning: 0 };

    // Per-level-per-section tracking for final score
    let levelSectionResults = {};
    LEVELS.forEach(l => {
        levelSectionResults[l] = { grammar:{c:0,t:0}, vocabulary:{c:0,t:0}, meaning:{c:0,t:0} };
    });

    let sectionStats = {
        grammar:    { correct: 0, total: 0 },
        vocabulary: { correct: 0, total: 0 },
        meaning:    { correct: 0, total: 0 }
    };

    function startAdaptiveTest() {
        showPage('page-test');
        nextAdaptiveQuestion();
    }

    function getTargetDifficulty() {
        // Clamp theta to 1–6, round to nearest integer for question selection
        return Math.max(1, Math.min(6, Math.round(theta)));
    }

    function updateTheta(correct, difficulty) {
        // Simplified IRT-style update
        // Expected probability of correct answer at current theta
        const p = 1 / (1 + Math.exp(-(theta - difficulty)));
        // Update step size decreases as more questions are answered
        const stepSize = Math.max(0.3, 0.9 - questionsAnswered * 0.025);
        if (correct) {
            theta += stepSize * (1 - p);
        } else {
            theta -= stepSize * p;
        }
        theta = Math.max(0.5, Math.min(6.5, theta));
    }

    function nextAdaptiveQuestion() {
        resetTimer();
        selectedIdx = null;

        const targetDiff = getTargetDifficulty();

        // Determine which sections still need questions
        const neededSections = Object.keys(sectionLimits).filter(
            s => sectionCounts[s] < sectionLimits[s]
        );

        if (neededSections.length === 0) {
            showResults();
            return;
        }

        // Try to find a question at target difficulty in a needed section
        // Search outward from target difficulty
        let pool = [];
        let chosenSection = null;

        for (let offset = 0; offset <= 5 && pool.length === 0; offset++) {
            for (let sign of [0, 1, -1]) {
                const d = targetDiff + sign * offset;
                if (d < 1 || d > 6) continue;

                // Try sections in random order, prioritising those furthest behind
                const sortedSections = neededSections.slice().sort((a,b) => sectionCounts[a] - sectionCounts[b]);

                for (const section of sortedSections) {
                    const candidates = allQuestions.filter(q =>
                        q.section === section &&
                        q.difficulty === d &&
                        !usedIds.has(q.id)
                    );
                    if (candidates.length > 0) {
                        pool = candidates;
                        chosenSection = section;
                        break;
                    }
                }
                if (pool.length > 0) break;
            }
        }

        if (pool.length === 0) {
            showResults();
            return;
        }

        // Pick randomly from pool
        currentQuestion = pool[Math.floor(Math.random() * pool.length)];
        usedIds.add(currentQuestion.id);
        sectionCounts[currentQuestion.section]++;

        // Render question
        document.getElementById('q-text').innerText = currentQuestion.question;
        document.getElementById('q-counter').innerText = `${questionsAnswered + 1} / ${maxQuestions}`;
        document.getElementById('progress').style.width = (questionsAnswered / maxQuestions * 100) + "%";

        const container = document.getElementById('options-container');
        container.innerHTML = currentQuestion.options.map((opt, i) =>
            `<div class="option" onclick="selectOption(${i}, this)">${String.fromCharCode(65+i)}. ${opt}</div>`
        ).join('');

        animateTimerBar();
        startTimer();
    }

    function handleNext() {
        clearInterval(timerId);
        const correctIdx = currentQuestion.answer.charCodeAt(0) - 65;
        const isCorrect = (selectedIdx === correctIdx);

        sectionStats[currentQuestion.section].total++;
        levelSectionResults[currentQuestion.level][currentQuestion.section].t++;

        if (isCorrect) {
            score++;
            sectionStats[currentQuestion.section].correct++;
            levelSectionResults[currentQuestion.level][currentQuestion.section].c++;
        }

        // Update ability estimate
        updateTheta(isCorrect, currentQuestion.difficulty);

        questionsAnswered++;
        if (questionsAnswered < maxQuestions) {
            nextAdaptiveQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        showPage('page-result');

        // Determine final level from theta
        // Theta:  <1.5=A1, 1.5–2.5=A2, 2.5–3.5=B1, 3.5–4.5=B2, 4.5–5.5=C1, >=5.5=C2
        let finalLevel;
        if      (theta < 1.5) finalLevel = "A1";
        else if (theta < 2.5) finalLevel = "A2";
        else if (theta < 3.5) finalLevel = "B1";
        else if (theta < 4.5) finalLevel = "B2";
        else if (theta < 5.5) finalLevel = "C1";
        else                   finalLevel = "C2";

        document.getElementById('res-level').innerText = finalLevel;
        document.getElementById('res-desc').innerText = LEVEL_NAMES[finalLevel];
        document.getElementById('res-score').innerText = `${score} / ${questionsAnswered} CORRECT ANSWERS`;

        let statsHtml = '';
        for (let s in sectionStats) {
            let data = sectionStats[s];
            if (data.total > 0) {
                let percentage = Math.round((data.correct / data.total) * 100);
                statsHtml += `<div class="stat-row">
                    <div style="text-transform: capitalize;">${s}</div>
                    <div>${percentage}%</div>
                </div>
                <div class="stat-bar"><div class="stat-fill" style="width:${percentage}%"></div></div>`;
            }
        }
        document.getElementById('stats-area').innerHTML = statsHtml;
    }

    function selectOption(idx, el) {
        selectedIdx = idx;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function showPage(id) {
        document.querySelectorAll('.container').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-num').innerText = timeLeft;
            if (timeLeft <= 0) handleNext();
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerId);
        timeLeft = 15;
        document.getElementById('timer-num').innerText = timeLeft;
    }

    function animateTimerBar() {
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none';
        bar.style.width = '100%';
        setTimeout(() => {
            bar.style.transition = 'width 15s linear';
            bar.style.width = '0%';
        }, 50);
    }
    </script>
